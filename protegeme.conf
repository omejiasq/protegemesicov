# ============================================
# BLOQUEO DE ACCESO DIRECTO POR IP
# Evita saltarse Cloudflare con la IP directa
# ============================================
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;
    ssl_certificate /etc/letsencrypt/live/sicov.protegeme.com.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sicov.protegeme.com.co/privkey.pem;
    return 444;
}

# ============================================
# SERVIDOR SICOV - FRONTEND Y MICROSERVICIOS
# ============================================
server {
    server_name sicov.protegeme.com.co;

    # ---------------------------
    # Headers de seguridad globales
    # ---------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ---------------------------
    # FRONTEND - index.html sin caché (evita error de chunks tras deploys)
    # ---------------------------
    location = /index.html {
        proxy_pass http://127.0.0.1:5173;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ---------------------------
    # FRONTEND (VITE - puerto 5173)
    # ---------------------------
    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --------------------------------------------------------------------
    # FIX: llamadas del frontend llegan como /api/auth/auth/login
    # --------------------------------------------------------------------
    location /api/auth/auth/ {
        proxy_pass http://127.0.0.1:4001/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --------------------------------------------------------------------
    # FIX: llamadas del frontend llegan como /api/auth/enterprise/...
    # --------------------------------------------------------------------
    location /api/auth/enterprise/ {
        proxy_pass http://127.0.0.1:4001/enterprise/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --------------------------------------------------------------------
    # FIX: menu-catalog no está bajo /auth/ en NestJS
    # --------------------------------------------------------------------
    location /api/auth/menu-catalog {
        proxy_pass http://127.0.0.1:4001/menu-catalog;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --------------------------------------------------------------------
    # FIX: users no está bajo /auth/ en NestJS
    # --------------------------------------------------------------------
    location /api/auth/users/ {
        proxy_pass http://127.0.0.1:4001/users/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------------------------
    # API AUTH
    # ---------------------------
    location /api/auth/ {
        proxy_pass http://127.0.0.1:4001/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------------------------
    # API INCIDENTS
    # ---------------------------
    location /api/incidents/ {
        proxy_pass http://127.0.0.1:4002/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------------------------
    # API USERS
    # ---------------------------
    location /api/users/ {
        proxy_pass http://127.0.0.1:4001/users/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------------------------
    # API AUTHORIZATIONS
    # ---------------------------
    location /api/authorizations/ {
        proxy_pass http://127.0.0.1:4003/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------------------------
    # API MAINTENANCE
    # ---------------------------
    location /api/maintenance/ {
        proxy_pass http://127.0.0.1:4004/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------------------------
    # API VEHICLES
    # ---------------------------
    location /api/vehicles/ {
        proxy_pass http://127.0.0.1:4005/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------------------------
    # API DRIVERS
    # ---------------------------
    location /api/drivers/ {
        proxy_pass http://127.0.0.1:4001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/sicov.protegeme.com.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sicov.protegeme.com.co/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# ============================================
# REDIRECCIÓN HTTP → HTTPS PARA SICOV
# ============================================
server {
    listen 80;
    server_name sicov.protegeme.com.co;
    return 301 https://$host$request_uri;
}

# ============================================
# SERVIDOR HELPDESK (GLPI) - CON SSL ACTIVADO
# ============================================
server {
    server_name helpdesk.protegeme.com.co;

    # Headers de seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Server $host;

        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        proxy_buffers 8 16k;
        proxy_buffer_size 32k;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/helpdesk.protegeme.com.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/helpdesk.protegeme.com.co/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# ============================================
# REDIRECCIÓN HTTP → HTTPS PARA HELPDESK
# ============================================
server {
    listen 80;
    server_name helpdesk.protegeme.com.co;
    return 301 https://$server_name$request_uri;
}

# ============================================
# SERVIDOR N8N - AUTOMATIZACIÓN
# ============================================
server {
    server_name n8n.protegeme.com.co;

    # Headers de seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    location / {
        proxy_pass http://127.0.0.1:5678;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket support (requerido por n8n)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    listen 80;
    # SSL se agrega con: sudo certbot --nginx -d n8n.protegeme.com.co
}
