# ============================================
# SERVIDOR SICOV - FRONTEND Y MICROSERVICIOS
# ============================================
server {
    server_name 23.227.173.137 sicov.protegeme.com.co;

    # ---------------------------
    # COMPRESION GZIP
    # ---------------------------
    gzip on;
    gzip_types application/json text/plain application/javascript text/css application/xml;
    gzip_min_length 1024;
    gzip_proxied any;

    # ---------------------------
    # FRONTEND (NGINX en contenedor - puerto 5173)
    # ---------------------------
    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # --------------------------------------------------------------------
    # FIX: algunas llamadas del frontend llegan como /api/auth/auth/login
    # --------------------------------------------------------------------
    location /api/auth/auth/ {
        proxy_pass http://127.0.0.1:4001/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ---------------------------
    # API ENTERPRISE
    # ---------------------------
    location /api/enterprise/ {
        proxy_pass http://127.0.0.1:4001/enterprise/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ---------------------------
    # API AUTH
    # ---------------------------
    location /api/auth/ {
        proxy_pass http://127.0.0.1:4001/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ---------------------------
    # API INCIDENTS
    # ---------------------------
    location /api/incidents/ {
        proxy_pass http://127.0.0.1:4002/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 30s;
    }

    # ---------------------------
    # API USERS
    # ---------------------------
    location /api/users/ {
        proxy_pass http://127.0.0.1:4001/users/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ---------------------------
    # API AUTHORIZATIONS
    # ---------------------------
    location /api/authorizations/ {
        proxy_pass http://127.0.0.1:4003/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 30s;
    }

    # ---------------------------
    # API MAINTENANCE
    # ---------------------------
    location /api/maintenance/ {
        proxy_pass http://127.0.0.1:4004/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;
    }

    # ---------------------------
    # API VEHICLES
    # ---------------------------
    location /api/vehicles/ {
        proxy_pass http://127.0.0.1:4005/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 30s;
    }

    # ---------------------------
    # API DRIVERS (puerto 4006)
    # ---------------------------
    location /api/drivers/ {
        proxy_pass http://127.0.0.1:4006/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 30s;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/sicov.protegeme.com.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sicov.protegeme.com.co/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# ============================================
# REDIRECCIÓN HTTP → HTTPS PARA SICOV
# ============================================
server {
    listen 80;
    server_name 23.227.173.137 sicov.protegeme.com.co;
    
    if ($host = sicov.protegeme.com.co) {
        return 301 https://$host$request_uri;
    }
    
    return 301 https://sicov.protegeme.com.co$request_uri;
}

# ============================================
# SERVIDOR HELPDESK (GLPI) - CON SSL ACTIVADO
# ============================================
server {
    server_name helpdesk.protegeme.com.co;

    # Configuración principal para GLPI
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Server $host;
        
        # Timeouts para GLPI
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # Buffers para mejor rendimiento
        proxy_buffers 8 16k;
        proxy_buffer_size 32k;
    }

    # Archivos estáticos - Caché mejorada
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/helpdesk.protegeme.com.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/helpdesk.protegeme.com.co/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# ============================================
# REDIRECCIÓN HTTP → HTTPS PARA HELPDESK
# ============================================
server {
    listen 80;
    server_name helpdesk.protegeme.com.co;
    return 301 https://$server_name$request_uri;
}
